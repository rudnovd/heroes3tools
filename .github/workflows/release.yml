name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Please refer to [changelog](https://github.com/rudnovd/heroes3tools/blob/master/CHANGELOG.md) for details.
