name: tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: true
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm run stylelint
      - run: pnpm run test
      - run: pnpm run build
